<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>方劑學 — 2차 수시 (5/20)</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#7d4e2d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Serif+KR:wght@400;500;700&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:#1a1411; --ink-soft:#4a3a30; --ink-mute:#7a6a60;
    --paper:#faf6ef; --paper-d:#f3ece0; --paper-dd:#e8ddc8;
    --terracotta:#b05030; --terracotta-d:#7d4e2d; --terracotta-l:#d8a08a;
    --gold:#b8893a; --green:#5a7a3a; --green-d:#3d5826; --crimson:#9a2c2c;
    --shadow:0 2px 8px rgba(58,40,30,.08); --shadow-l:0 1px 3px rgba(58,40,30,.06);
    --radius:8px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;height:100%}
  body{font-family:'Noto Serif KR','Nanum Myeongjo',serif;color:var(--ink);background:var(--paper);line-height:1.55;font-size:16px;overflow-x:hidden}
  .han,.hanja{font-family:'Noto Serif SC','Noto Serif KR',serif}
  header{position:sticky;top:0;z-index:50;background:var(--paper);border-bottom:1px solid var(--paper-dd);padding:10px 14px 0}
  .hdr-row{display:flex;align-items:center;gap:10px;max-width:760px;margin:0 auto}
  .hdr-title{font-weight:800;font-size:17px;color:var(--terracotta-d)}
  .hdr-spacer{flex:1}
  .countdown{font-size:12px;color:var(--terracotta);font-weight:700;padding:4px 10px;background:var(--paper-d);border-radius:12px}
  .countdown.urgent{background:var(--terracotta);color:white}
  nav.tabs{display:flex;gap:4px;padding:8px 8px 0;max-width:760px;margin:0 auto;overflow-x:auto;scrollbar-width:none}
  nav.tabs::-webkit-scrollbar{display:none}
  nav.tabs button{border:none;background:var(--paper-d);color:var(--ink-soft);padding:8px 14px;border-radius:18px 18px 0 0;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}
  nav.tabs button.active{background:white;color:var(--terracotta-d);box-shadow:var(--shadow);border:1px solid var(--paper-dd);border-bottom:none}
  main{max-width:760px;margin:0 auto;padding:14px;min-height:calc(100vh - 130px)}
  .card{background:white;border:1px solid var(--paper-dd);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;box-shadow:var(--shadow-l)}
  .card.accent{border-left:4px solid var(--terracotta)}
  .card.urgent{border-left:4px solid var(--crimson);background:#fff8f6}
  .card.success{border-left:4px solid var(--green)}
  .card.muted{background:var(--paper-d)}
  .card h2{margin:0 0 8px;font-size:17px;color:var(--terracotta-d)}
  .card h3{margin:0 0 6px;font-size:15px;color:var(--ink)}
  .card p{margin:6px 0}
  .card .meta{font-size:12px;color:var(--ink-mute);margin-bottom:8px}
  .plan-day{background:white;border:1px solid var(--paper-dd);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px}
  .plan-day .day-tag{display:inline-block;padding:2px 10px;background:var(--terracotta);color:white;border-radius:10px;font-size:11px;font-weight:700;margin-bottom:6px}
  .plan-day.today{border-color:var(--terracotta);box-shadow:0 0 0 3px rgba(176,80,48,.08)}
  .plan-day.today .day-tag{background:var(--crimson);animation:pulse 2s ease infinite}
  .plan-day.past{opacity:.55}
  .plan-day .label{font-weight:700;font-size:15px;margin:4px 0}
  .plan-day ul{margin:6px 0 8px;padding-left:18px;font-size:14px}
  .plan-day li{margin:3px 0}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(154,44,44,.18)}50%{box-shadow:0 0 0 6px rgba(154,44,44,.30)}}
  button.btn,a.btn{border:1px solid var(--terracotta);background:white;color:var(--terracotta-d);padding:7px 14px;border-radius:18px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block;transition:all .15s}
  button.btn:hover,a.btn:hover{background:var(--terracotta);color:white}
  button.btn.primary,a.btn.primary{background:var(--terracotta);color:white}
  button.btn.primary:hover{background:var(--terracotta-d)}
  button.btn.small{padding:4px 10px;font-size:12px}
  button.btn.green{border-color:var(--green);color:var(--green-d)}
  button.btn.green:hover{background:var(--green);color:white}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
  .chip{display:inline-block;padding:4px 10px;background:var(--paper-d);border-radius:12px;font-size:12px;color:var(--ink-soft);border:1px solid transparent;cursor:pointer}
  .chip:hover{background:var(--paper-dd)}
  .chip.active{background:var(--terracotta);color:white}
  .formula-item{background:white;border:1px solid var(--paper-dd);border-radius:var(--radius);padding:10px 14px;margin-bottom:8px;cursor:pointer;transition:all .15s}
  .formula-item:hover{border-color:var(--terracotta-l)}
  .formula-item .ko{font-weight:700;font-size:16px;color:var(--ink)}
  .formula-item .han{font-family:'Noto Serif SC',serif;color:var(--terracotta-d);margin-left:6px;font-size:14px}
  .formula-item .sub{font-size:12px;color:var(--ink-mute);margin-top:2px}
  .formula-item .action-mini{font-size:13px;color:var(--green-d);margin-top:4px}
  .formula-detail .section{margin:14px 0}
  .formula-detail .section h3{font-size:14px;color:var(--terracotta);margin:0 0 6px;padding-bottom:4px;border-bottom:1px dashed var(--paper-dd);text-transform:uppercase;letter-spacing:.5px}
  .composition-list{display:flex;flex-wrap:wrap;gap:6px}
  .herb-token{padding:4px 10px;background:var(--paper-d);border-radius:14px;font-size:13px;cursor:pointer}
  .herb-token:hover{background:var(--paper-dd)}
  .mm-grid{display:grid;grid-template-columns:max-content 1fr;gap:6px 12px;font-size:14px}
  .mm-grid .role{font-weight:700;color:var(--terracotta-d);text-align:center}
  .add-rules table{width:100%;border-collapse:collapse;font-size:13px}
  .add-rules td{padding:6px 8px;border-bottom:1px dotted var(--paper-dd);vertical-align:top}
  .add-rules td:first-child{font-weight:600;color:var(--ink-soft);white-space:nowrap}
  .fc-container{perspective:1000px;height:380px;margin:14px 0}
  .fc-card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .6s;cursor:pointer}
  .fc-card.flipped{transform:rotateY(180deg)}
  .fc-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:white;border:1px solid var(--paper-dd);border-radius:var(--radius);padding:20px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;box-shadow:var(--shadow);overflow:auto}
  .fc-back{transform:rotateY(180deg);justify-content:flex-start}
  .fc-front .ko{font-size:28px;font-weight:700;margin-bottom:8px}
  .fc-front .han{font-size:22px;color:var(--terracotta-d);font-family:'Noto Serif SC',serif;margin-bottom:14px}
  .fc-front .hint{font-size:12px;color:var(--ink-mute);margin-top:16px}
  .fc-back h3{color:var(--terracotta-d);font-size:18px;margin:0 0 10px;text-align:center;width:100%}
  .fc-back .action{color:var(--green-d);font-weight:700;font-size:16px;margin-bottom:10px;text-align:center;width:100%}
  .fc-back .indication{font-size:14px;color:var(--ink-soft);margin-bottom:8px;text-align:left;width:100%}
  .fc-back .composition{font-size:13px;color:var(--ink);width:100%;text-align:left}
  .fc-controls{display:flex;gap:6px;justify-content:space-between;margin-top:10px;flex-wrap:wrap}
  .fc-progress{font-size:12px;color:var(--ink-mute);text-align:center;margin-bottom:8px}
  .quiz-q{font-size:16px;font-weight:600;margin:14px 0;line-height:1.5}
  .quiz-options button{display:block;width:100%;text-align:left;background:white;border:1px solid var(--paper-dd);padding:10px 14px;margin:6px 0;border-radius:6px;font-family:inherit;font-size:14px;cursor:pointer;color:var(--ink);transition:all .15s}
  .quiz-options button:hover{border-color:var(--terracotta-l)}
  .quiz-options button.correct{background:#e8f3dc;border-color:var(--green);color:var(--green-d);font-weight:600}
  .quiz-options button.wrong{background:#fbe8e3;border-color:var(--crimson);color:var(--crimson)}
  .quiz-options button.disabled{cursor:not-allowed}
  .explanation{margin:14px 0;padding:12px 14px;background:var(--paper-d);border-left:3px solid var(--gold);border-radius:0 6px 6px 0;font-size:14px}
  .quiz-progress{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-mute);margin-bottom:8px}
  .quiz-progress .bar{flex:1;height:6px;background:var(--paper-dd);border-radius:3px;overflow:hidden}
  .quiz-progress .bar > div{height:100%;background:var(--terracotta);transition:width .3s}
  .search-input{width:100%;padding:10px 12px;font-size:15px;border:1px solid var(--paper-dd);border-radius:6px;background:white;font-family:inherit;color:var(--ink)}
  .search-input:focus{outline:none;border-color:var(--terracotta)}
  .compare-table{width:100%;border-collapse:collapse;font-size:13px}
  .compare-table th{background:var(--paper-d);padding:8px;text-align:left;border-bottom:2px solid var(--terracotta);font-weight:700;color:var(--terracotta-d)}
  .compare-table td{padding:8px;border-bottom:1px solid var(--paper-dd);vertical-align:top}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:white;padding:10px 18px;border-radius:22px;font-size:14px;z-index:100;box-shadow:var(--shadow);animation:slideUp .3s}
  .toast.success{background:var(--green-d)}
  .toast.error{background:var(--crimson)}
  @keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
  footer{text-align:center;color:var(--ink-mute);font-size:11px;padding:20px 14px;max-width:760px;margin:0 auto}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  .text-small{font-size:12px;color:var(--ink-mute)}
  .badge{display:inline-block;padding:2px 8px;background:var(--terracotta);color:white;border-radius:10px;font-size:11px;font-weight:700}
  .badge.gold{background:var(--gold)}
  details{margin:8px 0}
  details summary{cursor:pointer;font-weight:600;color:var(--ink-soft);padding:6px 0;font-size:14px}
  details summary:hover{color:var(--terracotta)}
  @media (max-width:480px){
    nav.tabs button{padding:7px 10px;font-size:12px}
    .hdr-title{font-size:15px}
    main{padding:10px}
    .card{padding:12px}
    .fc-container{height:340px}
    .fc-front .ko{font-size:24px}
    .fc-front .han{font-size:18px}
  }
</style>
</head>
<body>

<header>
  <div class="hdr-row">
    <div class="hdr-title">方劑學 · 2차 수시</div>
    <div class="hdr-spacer"></div>
    <div id="countdown" class="countdown">계산중…</div>
  </div>
  <nav class="tabs" id="tabs">
    <button data-tab="home">홈·계획</button>
    <button data-tab="formulas">처방 24</button>
    <button data-tab="flashcard">암기카드</button>
    <button data-tab="quiz">객관식</button>
    <button data-tab="past">작년 기출</button>
    <button data-tab="compare">처방 비교</button>
    <button data-tab="herbs">약재</button>
    <button data-tab="srs">오답함</button>
  </nav>
</header>

<main id="view"></main>

<footer>
  方劑學 学習帳 v1.0 · 2026-05-20 시험 대비 · CIM Lab<br>
  데이터: 시험 범위 PDF + 22학번 기출 (범위 일치 항목만)
</footer>

<script src="data-formulas.js"></script>
<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
