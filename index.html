<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#9C3030">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>方劑學 — 神農의 방</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700;900&family=Noto+Serif+SC:wght@400;500;600;700;900&family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════════════════════════════
 * 方劑學 v2.2 — 中華 帝王風 디자인 시스템 (NO-SVG)
 * v2.2 변경:
 *  · SVG 전면 폐기 (메달리온·로더·차트 모두 CSS/HTML)
 *  · 신농 아이콘 (헤더·favicon)
 *  · 로비 버전 표시
 *  · 등급 사다리에 등급별 사용자
 *  · 베팅별 대기 사용자 카운트·이름
 *  · 약재 성미 scatter + 효능 grid + 처방내 위치 pie
 * ═══════════════════════════════════════════════════════════════════ */

:root{
  --zhusha:#9C3030; --zhusha-d:#6E1818; --zhusha-l:#C04848;
  --huang:#C9A227;  --huang-d:#8C6818;  --huang-l:#FFE08A;
  --mo:#1C140A;     --mo-l:#3A2A18;
  --mi:#F5E6D3;     --mi-d:#E8D4B8;     --mi-w:#FCF4E5;
  --feicui:#2A7060; --gutong:#876A36;   --xuan:#2C2E48;
  --bone:#F0E0C0;

  --font-display:'ZCOOL XiaoWei','Ma Shan Zheng','Noto Serif KR','Noto Serif SC',serif;
  --font-body:'Noto Serif KR','Noto Serif SC',serif;
  --font-han:'Noto Serif SC','Noto Serif KR',serif;

  --r-sm:6px; --r:10px; --r-lg:14px;
  --sh-sm:0 1px 3px rgba(28,20,10,.18);
  --sh:0 3px 10px rgba(28,20,10,.22);
  --sh-lg:0 8px 24px rgba(28,20,10,.32);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;font-family:var(--font-body);color:var(--mo);background:var(--mi)}
body{
  min-height:100vh;
  background:
    radial-gradient(ellipse at top right, rgba(201,162,39,.12) 0%, transparent 55%),
    radial-gradient(ellipse at bottom left, rgba(156,48,48,.08) 0%, transparent 60%),
    repeating-linear-gradient(45deg, transparent 0 22px, rgba(135,106,54,.022) 22px 23px),
    var(--mi);
  background-attachment:fixed;
  font-size:15px;line-height:1.55;padding:0 0 96px;
  -webkit-text-size-adjust:100%;
}
.han{font-family:var(--font-han);letter-spacing:.02em}
.seal{font-family:var(--font-display);letter-spacing:.04em}

/* ─── 헤더 ───────────────────────────────────────────────────────── */
.app-header{
  position:sticky;top:0;z-index:50;
  background:linear-gradient(180deg, var(--zhusha-d) 0%, var(--zhusha) 100%);
  border-bottom:3px double var(--huang);
  color:var(--huang-l);padding:10px 12px;box-shadow:0 3px 10px rgba(28,20,10,.32);
}
.app-header .row{display:flex;align-items:center;gap:8px;max-width:680px;margin:0 auto}
.app-header .logo{
  width:38px;height:38px;flex-shrink:0;border-radius:50%;background:var(--mi-w);
  box-shadow:inset 0 0 0 2px var(--huang),0 1px 4px rgba(0,0,0,.4);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.app-header .logo img{width:100%;height:100%;display:block;object-fit:cover}
.app-header .titlewrap{display:flex;flex-direction:column;line-height:1}
.app-header .title{font-family:var(--font-display);font-size:19px;letter-spacing:.06em}
.app-header .subtitle{font-size:9.5px;opacity:.88;letter-spacing:.18em;text-transform:uppercase;margin-top:1px}
.app-header .head-chips{margin-left:auto;display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.head-chip{
  display:inline-flex;align-items:center;gap:5px;background:rgba(0,0,0,.30);
  padding:4px 9px;border-radius:14px;border:1px solid var(--huang-l);
  font-size:11.5px;color:var(--huang-l);cursor:pointer;
  font-family:var(--font-display);
}
.head-chip:hover{background:rgba(0,0,0,.45)}
.head-chip .seal-mini{
  display:inline-flex;align-items:center;justify-content:center;
  width:18px;height:18px;border-radius:3px;background:var(--huang-l);color:var(--zhusha-d);
  font-family:var(--font-display);font-weight:700;font-size:12px;
}
.head-chip .amt{font-weight:700;font-family:var(--font-display)}

/* ─── 버전 칩 (로비) ─────────────────────────────────────────────── */
.version-chip{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(28,20,10,.06);border:1px solid var(--mi-d);
  border-radius:12px;padding:4px 10px;
  font-family:var(--font-display);font-size:11.5px;color:var(--gutong);
  letter-spacing:.06em;
}
.version-chip .dot{width:7px;height:7px;border-radius:50%;background:var(--feicui);box-shadow:0 0 5px rgba(42,112,96,.55)}
.version-row{display:flex;justify-content:center;gap:6px;margin:6px 0 8px;flex-wrap:wrap}

/* ─── 메인 ─────────────────────────────────────────────────────────── */
#view{max-width:680px;margin:0 auto;padding:14px 14px 24px}

/* ─── 뷰 타이틀 ───────────────────────────────────── */
.view-title{
  display:flex;align-items:center;justify-content:center;gap:12px;
  margin:8px 0 12px;font-family:var(--font-display);font-weight:600;
  color:var(--mo);font-size:24px;letter-spacing:.06em;
}
.view-title::before,.view-title::after{
  content:'';height:1px;flex:1;
  background:linear-gradient(90deg, transparent, var(--gutong) 40%, var(--gutong) 60%, transparent);
}
.view-title .han{color:var(--zhusha);font-size:.78em;letter-spacing:.12em;margin-right:4px}
.view-sub{text-align:center;color:var(--mo-l);font-size:12.5px;margin-bottom:18px;letter-spacing:.04em}

/* ─── 카드 ─────────────────────────────────────────────────────────── */
.card{
  background:var(--mi-w);border:1px solid var(--mi-d);border-radius:var(--r);
  padding:14px;margin-bottom:10px;box-shadow:var(--sh-sm);position:relative;
}
.card.imperial{
  border:1.5px solid var(--zhusha);
  background:linear-gradient(180deg, var(--mi-w) 0%, var(--mi) 100%);
}
.card.imperial::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg, var(--huang) 0%, var(--zhusha) 50%, var(--huang) 100%);
  border-radius:var(--r) 0 0 var(--r);
}
.card.gold{border:1.5px solid var(--huang-d);background:linear-gradient(180deg, #FFF8E0 0%, #FFEFC0 100%)}
.card-title{font-family:var(--font-display);font-size:16px;color:var(--zhusha-d);margin-bottom:6px;letter-spacing:.04em}

/* ─── 버튼 ─────────────────────────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  font-family:var(--font-body);font-weight:600;font-size:14px;
  padding:9px 16px;border-radius:var(--r-sm);cursor:pointer;
  border:1.5px solid var(--zhusha-d);background:var(--zhusha);color:var(--huang-l);
  transition:transform .08s ease, box-shadow .08s ease, background .12s ease;
  text-decoration:none;
}
.btn:hover{background:var(--zhusha-d);box-shadow:var(--sh-sm)}
.btn:active{transform:translateY(1px)}
.btn-o{background:transparent;color:var(--zhusha-d);border-color:var(--zhusha-d)}
.btn-o:hover{background:rgba(156,48,48,.08)}
.btn-gold{background:var(--huang);border-color:var(--huang-d);color:var(--mo)}
.btn-gold:hover{background:var(--huang-d);color:var(--huang-l)}
.btn-ghost{background:transparent;color:var(--mo-l);border-color:var(--mi-d)}
.btn-ghost:hover{background:var(--mi)}
.btn-sm{padding:6px 11px;font-size:12.5px}
.btn-lg{padding:13px 22px;font-size:16px;letter-spacing:.06em}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ─── 입력 ─────────────────────────────────────────────────────────── */
input,textarea,select{
  font-family:var(--font-body);font-size:14px;color:var(--mo);
  background:var(--mi-w);border:1.5px solid var(--mi-d);border-radius:var(--r-sm);
  padding:8px 12px;outline:none;transition:border-color .15s ease;width:100%;
}
input:focus,textarea:focus,select:focus{border-color:var(--zhusha)}
textarea{min-height:64px;resize:vertical;font-family:var(--font-body)}
label{font-size:12px;color:var(--mo-l);font-weight:600;letter-spacing:.04em;display:block;margin-bottom:4px}

/* ─── 하단 네비 ───────────────────────────────────────────────────── */
.bottom-nav{
  position:fixed;left:0;right:0;bottom:0;z-index:50;
  background:linear-gradient(180deg, #fcf4e5 0%, #f0dec0 100%);
  border-top:2px solid var(--huang-d);
  box-shadow:0 -4px 14px rgba(28,20,10,.18);
  padding-bottom:env(safe-area-inset-bottom);
}
/* v11.3: hub 진입 시 bottom nav 완전 숨김 — 醫書宮은 과목 선택 화면이므로 방제학 메뉴 X */
body.on-hub .bottom-nav { display:none !important; }
body.on-hub main#view { padding-bottom:18px !important; }
/* v11.6.1 FIX: 진단학·경혈학 房에서는 하단 nav 가 반드시 보이도록 강제 + 색상 토큰 */
body.on-dongmu .bottom-nav { display:block !important; border-top-color:#9C3030 !important; }
body.on-saam   .bottom-nav { display:block !important; border-top-color:#3A6A4A !important; }
body.on-dongmu .nav-btn.active{color:#9C3030 !important;}
body.on-dongmu .nav-btn.active .ic{color:#9C3030 !important;}
body.on-dongmu .nav-btn.active::after{background:#9C3030 !important;}
body.on-saam   .nav-btn.active{color:#3A6A4A !important;}
body.on-saam   .nav-btn.active .ic{color:#3A6A4A !important;}
body.on-saam   .nav-btn.active::after{background:#3A6A4A !important;}
.bottom-nav-inner{display:flex;max-width:680px;margin:0 auto}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  padding:8px 4px 7px;border:none;background:transparent;cursor:pointer;
  font-family:var(--font-body);color:var(--mo-l);transition:color .12s, background .12s;
  position:relative;
}
.nav-btn .ic{font-family:var(--font-display);font-size:18px;line-height:1;color:var(--gutong)}
.nav-btn .lb{font-size:10px;letter-spacing:.04em;margin-top:1px}
.nav-btn:hover{background:rgba(156,48,48,.05)}
.nav-btn.active{color:var(--zhusha-d)}
.nav-btn.active .ic{color:var(--zhusha)}
.nav-btn.active::after{
  content:'';position:absolute;left:50%;top:0;width:40%;height:3px;
  background:var(--zhusha);transform:translateX(-50%);border-radius:0 0 3px 3px;
}

/* ─── 홈 타일 ─────────────────────────────────────────────── */
.tile-grid{display:grid;grid-template-columns:repeat(2, 1fr);gap:10px;margin:14px 0}
.tile{
  background:var(--mi-w);border:1.5px solid var(--zhusha);border-radius:var(--r);
  padding:14px 12px;cursor:pointer;text-align:left;
  display:flex;flex-direction:column;gap:3px;
  font-family:var(--font-body);color:var(--mo);
  transition:transform .12s ease, box-shadow .12s ease, background .15s ease;
  position:relative;overflow:hidden;
}
.tile::before{
  content:'';position:absolute;right:-12px;top:-12px;width:48px;height:48px;
  border-radius:50%;background:rgba(201,162,39,.15);pointer-events:none;
}
.tile:hover{transform:translateY(-1px);box-shadow:var(--sh)}
.tile:active{transform:translateY(0)}
.tile .han{font-family:var(--font-display);font-size:18px;color:var(--zhusha);letter-spacing:.06em}
.tile .ttl{font-size:14px;font-weight:700;color:var(--mo);margin-top:1px}
.tile .desc{font-size:11.5px;color:var(--mo-l);margin-top:2px;line-height:1.35}
.tile.wide{grid-column:span 2}
.tile.gold{background:linear-gradient(180deg, #FFF8DC 0%, #FFE08A 100%);border-color:var(--huang-d)}
.tile.gold .han{color:var(--zhusha-d)}

/* ─── 카운트다운 ────────────────────────────────────────────── */
.dday-banner{
  background:linear-gradient(135deg, var(--zhusha-d) 0%, var(--zhusha) 50%, var(--huang-d) 100%);
  color:var(--huang-l);padding:18px 16px;border-radius:var(--r-lg);margin-bottom:14px;
  box-shadow:var(--sh);position:relative;overflow:hidden;
  border:1.5px solid var(--huang);
}
.dday-banner::before{
  content:'';position:absolute;right:-30px;bottom:-30px;width:160px;height:160px;
  background:radial-gradient(circle, rgba(255,224,138,.2) 0%, transparent 70%);
  pointer-events:none;
}
.dday-banner .label{font-family:var(--font-display);font-size:12px;letter-spacing:.18em;opacity:.85;text-transform:uppercase}
.dday-banner .big{font-family:var(--font-display);font-size:44px;font-weight:700;line-height:1;margin-top:2px;letter-spacing:.02em}
.dday-banner .big .dash{font-size:.7em;margin:0 4px;opacity:.65}
.dday-banner .meta{font-size:12px;opacity:.9;margin-top:8px;line-height:1.5}
.dday-banner .meta .han{color:var(--huang-l);font-size:13px}

/* ═══════════════════════════════════════════════════════════════════
 * CSS 메달리온 (SVG 대체) — v2.2
 * 9개 카테고리별 색채. 사진 있으면 위에 덮음.
 * ═══════════════════════════════════════════════════════════════════ */
.cmedal{
  position:relative;display:inline-block;vertical-align:middle;
  border-radius:50%;overflow:hidden;flex-shrink:0;
  background:radial-gradient(circle at 50% 38%, var(--cmed-bg1, #E8C8A0) 0%, var(--cmed-bg2, #A87454) 100%);
  border:2px solid var(--cmed-ring, #7A3D27);
  box-shadow:0 1px 4px rgba(28,20,10,.28), inset 0 0 0 1px rgba(255,255,255,.12);
}
.cmedal-init{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-58%);
  font-family:var(--font-display);font-weight:700;
  color:var(--cmed-fg, #3A1810);line-height:1;
  text-shadow:0 1px 2px rgba(0,0,0,.18);
  pointer-events:none;
}
.cmedal-name{
  position:absolute;left:0;right:0;bottom:0;
  text-align:center;padding:3px 2px 4px;
  background:linear-gradient(to bottom, transparent 0%, var(--cmed-init-bg, #3A1810) 80%);
  color:var(--cmed-init-fg, #F5E6D3);
  font-family:var(--font-display);font-weight:600;letter-spacing:.04em;
  pointer-events:none;
}
.cmedal-photo{
  position:absolute;border-radius:50%;object-fit:cover;
  background:var(--mi-w);box-shadow:0 1px 4px rgba(0,0,0,.25);
}

/* 카테고리 팔레트 */
.cmedal.cat-divine  {--cmed-ring:#C9A227; --cmed-bg1:#FFE08A; --cmed-bg2:#E0A030; --cmed-fg:#5C2C0C; --cmed-init-bg:#5C2C0C; --cmed-init-fg:#FFE08A}
.cmedal.cat-ancient {--cmed-ring:#7A3D27; --cmed-bg1:#E8C8A0; --cmed-bg2:#A87454; --cmed-fg:#3A1810; --cmed-init-bg:#3A1810; --cmed-init-fg:#F5E6D3}
.cmedal.cat-tang    {--cmed-ring:#B22222; --cmed-bg1:#F0C8B0; --cmed-bg2:#C04030; --cmed-fg:#2A0C08; --cmed-init-bg:#2A0C08; --cmed-init-fg:#F5E6D3}
.cmedal.cat-song    {--cmed-ring:#4A6840; --cmed-bg1:#C8D8B8; --cmed-bg2:#688058; --cmed-fg:#1C2810; --cmed-init-bg:#1C2810; --cmed-init-fg:#E8E8C8}
.cmedal.cat-jinyuan {--cmed-ring:#6A4C8C; --cmed-bg1:#D0BCE8; --cmed-bg2:#8064A8; --cmed-fg:#28143C; --cmed-init-bg:#28143C; --cmed-init-fg:#E8DCF4}
.cmedal.cat-ming    {--cmed-ring:#1A4C7C; --cmed-bg1:#A8C4DC; --cmed-bg2:#3068A0; --cmed-fg:#08203C; --cmed-init-bg:#08203C; --cmed-init-fg:#D8E4F0}
.cmedal.cat-qing    {--cmed-ring:#2A7060; --cmed-bg1:#A8D0C0; --cmed-bg2:#48907C; --cmed-fg:#0C2820; --cmed-init-bg:#0C2820; --cmed-init-fg:#D8ECDC}
.cmedal.cat-late    {--cmed-ring:#8C5028; --cmed-bg1:#E0C098; --cmed-bg2:#B06838; --cmed-fg:#341808; --cmed-init-bg:#341808; --cmed-init-fg:#F0DCC4}
.cmedal.cat-korean  {--cmed-ring:#9C3030; --cmed-bg1:#F0D0C0; --cmed-bg2:#C04848; --cmed-fg:#3C0C0C; --cmed-init-bg:#3C0C0C; --cmed-init-fg:#F8E8D8}
.cmedal.cat-gag     {--cmed-ring:#E84E80; --cmed-bg1:#FFCEDC; --cmed-bg2:#FF8FB0; --cmed-fg:#5C0828; --cmed-init-bg:#5C0828; --cmed-init-fg:#FFE0EC}

/* ─── v4: 神階 메달리온 발광 효과 ───────────────────────────────────────── */
/* 神階 캐릭터 (黃帝·神農·伏羲·女媧·岐伯) 의 메달리온 주변에 황금빛 오로라.
   2.6초 주기 부드러운 펄스 + 정적 outer glow.
   부모에 overflow:hidden 이 있는 작은 칩에선 자연스럽게 잘림 (의도).
   nth-child delay 로 다중 표시 시 파동 효과 */
.cmedal.cat-divine{
  box-shadow:
    0 1px 4px rgba(28,20,10,.28),
    inset 0 0 0 1px rgba(255,255,255,.18),
    0 0 12px 2px rgba(255,224,138,.55),
    0 0 26px 6px rgba(201,162,39,.34);
  animation: divine-aura 2.6s ease-in-out infinite;
  position:relative;
}
.cmedal.cat-divine::before{
  content:'';position:absolute;inset:-6px;border-radius:50%;
  background: conic-gradient(
    from 0deg,
    rgba(255,224,138,0) 0%, rgba(255,224,138,.55) 12%,
    rgba(255,224,138,0) 25%, rgba(255,224,138,.45) 50%,
    rgba(255,224,138,0) 75%, rgba(255,224,138,.55) 88%,
    rgba(255,224,138,0) 100%);
  filter: blur(7px); opacity:.55; z-index:-1;
  animation: divine-spin 7s linear infinite;
  pointer-events:none;
}
@keyframes divine-aura{
  0%,100% { box-shadow:
    0 1px 4px rgba(28,20,10,.28),
    inset 0 0 0 1px rgba(255,255,255,.18),
    0 0 12px 2px rgba(255,224,138,.55),
    0 0 26px 6px rgba(201,162,39,.34); }
  50%     { box-shadow:
    0 1px 4px rgba(28,20,10,.28),
    inset 0 0 0 1px rgba(255,255,255,.28),
    0 0 22px 4px rgba(255,224,138,.85),
    0 0 42px 10px rgba(201,162,39,.55); }
}
@keyframes divine-spin{ to { transform: rotate(360deg); } }
/* picker grid 등에서 神階 5인이 나란히 있을 때 위상차로 파동 */
.char-grid .char-cell:nth-child(1) .cmedal.cat-divine{ animation-delay: 0s; }
.char-grid .char-cell:nth-child(2) .cmedal.cat-divine{ animation-delay: .52s; }
.char-grid .char-cell:nth-child(3) .cmedal.cat-divine{ animation-delay: 1.04s; }
.char-grid .char-cell:nth-child(4) .cmedal.cat-divine{ animation-delay: 1.56s; }
.char-grid .char-cell:nth-child(5) .cmedal.cat-divine{ animation-delay: 2.08s; }
/* prefers-reduced-motion 존중 */
@media (prefers-reduced-motion: reduce){
  .cmedal.cat-divine{ animation: none; }
  .cmedal.cat-divine::before{ animation: none; opacity:.3; }
}

/* ─── 등급 진행 바 ────────────────────────────────────────────────── */
.rank-bar{height:10px;background:var(--mi-d);border-radius:5px;overflow:hidden;position:relative;margin-top:8px}
.rank-bar-fill{height:100%;background:linear-gradient(90deg, var(--huang) 0%, var(--zhusha) 100%);transition:width .4s ease}

/* ─── 璽印 ──────────────────────────────────────────────── */
.seal-stamp{
  display:inline-flex;align-items:center;justify-content:center;
  width:42px;height:42px;background:var(--zhusha);color:var(--huang-l);
  font-family:var(--font-display);font-weight:700;font-size:24px;
  border:2px solid var(--huang);border-radius:6px;
  box-shadow:0 2px 6px rgba(28,20,10,.3),inset 0 0 0 1px rgba(255,224,138,.2);
  letter-spacing:0;flex-shrink:0;
}
.seal-stamp.big{width:64px;height:64px;font-size:38px;border-width:3px}
.seal-stamp.tiny{width:22px;height:22px;font-size:14px;border-width:1.5px;border-radius:3px}

/* ─── 四象 진영 (faction) ───────────────────────────────────────────── */
/* 프로필·메달리온 옆 컴팩트 칩 (2자 한자) */
.faction-chip{
  display:inline-flex;align-items:center;justify-content:center;
  padding:2px 6px;height:22px;
  font-family:var(--font-display);font-weight:700;font-size:12px;
  color:rgba(255,255,255,.96);
  border:1.5px solid rgba(0,0,0,.18);border-radius:3px;
  letter-spacing:.04em;flex-shrink:0;line-height:1;
  text-shadow:0 1px 1px rgba(0,0,0,.35);
  box-shadow:0 1px 2px rgba(0,0,0,.18),inset 0 0 0 1px rgba(255,255,255,.08);
}
.faction-chip.big{height:28px;padding:3px 9px;font-size:15px;border-radius:4px}
.faction-chip.tiny{height:16px;padding:1px 4px;font-size:10px;border-radius:2px}

/* 라디오형 진영 선택 (이름 변경 모달 내) */
.faction-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:6px;
}
.faction-cell{
  display:flex;flex-direction:column;align-items:flex-start;gap:3px;
  padding:8px 10px;border:1.5px solid var(--mi-d);border-radius:6px;
  background:var(--mi-w);cursor:pointer;text-align:left;
  transition:transform .08s ease,border-color .12s ease,box-shadow .12s ease;
}
.faction-cell:hover{border-color:var(--gutong)}
.faction-cell.selected{
  border-color:var(--ftc,var(--zhusha));
  box-shadow:0 0 0 2px rgba(201,162,39,.18),inset 0 0 0 1px var(--ftc,var(--zhusha));
  transform:translateY(-1px);
}
.faction-cell .ft-head{display:flex;align-items:center;gap:6px;width:100%}
.faction-cell .ft-han{
  font-family:var(--font-display);font-weight:700;font-size:14px;
  color:var(--ftc,var(--mo))
}
.faction-cell .ft-ko{font-size:11px;color:var(--mo-l)}
.faction-cell .ft-pas{
  font-size:10.5px;color:var(--gutong);line-height:1.35;margin-top:2px
}

/* 영토 (territory) 바 — 진영별 氣 점유율 시각화 */
.territory-card{margin-top:14px}
.territory-bar{
  display:flex;width:100%;height:64px;
  border:2px solid var(--mo);border-radius:6px;overflow:hidden;
  box-shadow:0 2px 8px rgba(28,20,10,.25),inset 0 0 0 1px rgba(255,224,138,.12);
  background:var(--mi-w);position:relative;
}
.territory-seg{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:rgba(255,255,255,.96);font-family:var(--font-display);font-weight:700;
  text-shadow:0 1px 2px rgba(0,0,0,.5);
  border-right:1px solid rgba(0,0,0,.28);
  position:relative;overflow:hidden;min-width:0;
  background-image:
    repeating-linear-gradient(45deg,
      rgba(255,255,255,.07) 0 6px,
      rgba(0,0,0,.04) 6px 12px);
  transition:flex-grow .6s cubic-bezier(.2,.7,.2,1);
}
.territory-seg:last-child{border-right:none}
.territory-seg .t-han{font-size:18px;letter-spacing:.05em;line-height:1}
.territory-seg .t-pct{font-size:11px;font-weight:600;opacity:.92;margin-top:3px}
.territory-seg.empty{
  background:repeating-linear-gradient(45deg,
    var(--mi-d) 0 6px,var(--mi-w) 6px 12px);
  color:var(--gutong);text-shadow:none;
}
.territory-seg.empty .t-han{opacity:.55}
.territory-legend{
  display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:10px;
  font-size:11.5px
}
.territory-legend-row{
  display:flex;align-items:center;gap:6px;padding:5px 7px;
  background:var(--mi-w);border:1px solid var(--mi-d);border-radius:4px;
  min-width:0;
}
.territory-legend-row .dot{
  width:10px;height:10px;border-radius:2px;flex-shrink:0;
  border:1px solid rgba(0,0,0,.25)
}
.territory-legend-row .lg-han{
  font-family:var(--font-display);font-weight:700;color:var(--mo);
  flex-shrink:0
}
.territory-legend-row .lg-meta{
  color:var(--gutong);flex:1;min-width:0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  font-size:10.5px
}
.territory-legend-row.is-mine{
  background:#FFF8E0;border-color:var(--huang)
}
.territory-mybadge{
  font-size:10px;color:var(--zhusha-d);font-weight:700;flex-shrink:0
}

/* ─── 사용자 리스트 (presence) ─────────────────────────────────────── */
.presence-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.presence-chip{
  display:flex;align-items:center;gap:5px;padding:4px 8px;
  background:var(--mi-w);border:1px solid var(--mi-d);border-radius:14px;
  font-size:11.5px;color:var(--mo-l);
}
.presence-chip .dot{width:7px;height:7px;background:var(--feicui);border-radius:50%;box-shadow:0 0 4px rgba(42,112,96,.6);flex-shrink:0}
.presence-chip .nm{font-weight:600;color:var(--mo);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ─── 피드백 ─────────────────────────────────────────────────── */
.feedback-form{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.feedback-list{margin-top:10px;display:flex;flex-direction:column;gap:6px;max-height:240px;overflow-y:auto}
.feedback-item{
  background:var(--mi-w);border-left:3px solid var(--gutong);
  padding:7px 10px;border-radius:4px;font-size:12.5px;color:var(--mo-l);
}
.feedback-item .who{font-weight:600;color:var(--zhusha-d);font-size:11px;margin-right:6px}
.feedback-item .when{font-size:10px;color:#999;margin-left:6px}

/* ─── 토스트 ─────────────────────────────────────────────────────── */
#toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--mo);color:var(--huang-l);padding:9px 16px;border-radius:var(--r);
  font-size:13px;font-family:var(--font-display);letter-spacing:.04em;
  border:1.5px solid var(--huang);box-shadow:var(--sh-lg);
  opacity:0;transition:opacity .2s, transform .2s;pointer-events:none;z-index:200;
  max-width:90%;text-align:center;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.gold{background:var(--huang);color:var(--mo);border-color:var(--zhusha)}

/* ─── 모달 ─────────────────────────────────────────────────────────── */
.modal-back{
  position:fixed;inset:0;background:rgba(28,20,10,.65);z-index:300;
  display:flex;align-items:center;justify-content:center;padding:14px;
}
.modal{
  background:var(--mi-w);border:2px solid var(--zhusha);border-radius:var(--r-lg);
  max-width:480px;width:100%;max-height:90vh;overflow-y:auto;
  box-shadow:var(--sh-lg);padding:20px;position:relative;
}
.modal .x{position:absolute;top:8px;right:10px;cursor:pointer;font-size:22px;color:var(--mo-l);
  background:none;border:none;line-height:1;padding:4px 8px;z-index:5}

/* ─── 페이드 ─────────────────────────────────────────────────────── */
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ─── 캐릭터 picker 그리드 ────────────────────────────────────────── */
.char-grid{display:grid;grid-template-columns:repeat(3, 1fr);gap:8px;margin-top:10px}
.char-cell{
  background:var(--mi-w);border:1.5px solid var(--mi-d);border-radius:var(--r);
  padding:10px 6px 8px;text-align:center;cursor:pointer;
  transition:transform .1s, border-color .1s, box-shadow .1s;
  display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;
}
.char-cell:hover{transform:translateY(-1px);border-color:var(--zhusha);box-shadow:var(--sh-sm)}
.char-cell.selected{border-color:var(--zhusha);background:#FFF8E8;box-shadow:0 0 0 2px var(--huang-l) inset}
.char-cell.locked{opacity:.55;cursor:not-allowed}
.char-cell.locked .lock-badge{
  position:absolute;top:4px;right:4px;background:var(--zhusha-d);color:var(--huang-l);
  font-size:9.5px;padding:1px 5px;border-radius:8px;font-family:var(--font-display);
  border:1px solid var(--huang);
}
.char-cell .nm{font-size:12px;font-weight:600;color:var(--mo);margin-top:2px}
.char-cell .han{font-family:var(--font-han);font-size:10.5px;color:var(--zhusha-d);margin-top:1px}
.char-cell .work{font-size:9.5px;color:var(--gutong);margin-top:1px;line-height:1.25}

/* ─── 배틀 인트로 ─────────────────────────────────────────────────── */
.intro-stage{padding:6px 0;text-align:center;animation:introFade .45s ease-out}
@keyframes introFade{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}
.intro-side{display:flex;flex-direction:column;align-items:center;margin:6px 0}
.intro-charwrap{position:relative;display:inline-flex;flex-direction:column;align-items:center}
.intro-bubble{
  position:relative;max-width:340px;background:var(--mi-w);border:1.5px solid var(--zhusha);
  border-radius:14px;padding:10px 14px;margin:8px;text-align:center;box-shadow:var(--sh-sm);
}
.intro-bubble.bubble-top{margin-bottom:14px}
.intro-bubble.bubble-bottom{margin-top:14px}
.intro-bubble.bubble-top::before{content:'';position:absolute;left:50%;transform:translateX(-50%);
  bottom:-10px;width:0;height:0;border:10px solid transparent;border-top-color:var(--zhusha);border-bottom:0}
.intro-bubble.bubble-top::after{content:'';position:absolute;left:50%;transform:translateX(-50%);
  bottom:-7px;width:0;height:0;border:8px solid transparent;border-top-color:var(--mi-w);border-bottom:0}
.intro-bubble.bubble-bottom::before{content:'';position:absolute;left:50%;transform:translateX(-50%);
  top:-10px;width:0;height:0;border:10px solid transparent;border-bottom-color:var(--zhusha);border-top:0}
.intro-bubble.bubble-bottom::after{content:'';position:absolute;left:50%;transform:translateX(-50%);
  top:-7px;width:0;height:0;border:8px solid transparent;border-bottom-color:var(--mi-w);border-top:0}

/* v4: TTS 발화 중 말풍선 강조 — 양측 동시 펄스 */
.intro-bubble.intro-speaking{
  animation: introSpeak 0.6s ease-in-out infinite alternate;
  box-shadow: 0 0 0 0 rgba(156,48,48,.0), var(--sh-sm);
}
@keyframes introSpeak{
  from { box-shadow: 0 0 0 0 rgba(201,162,39,.35), 0 2px 6px rgba(0,0,0,.12); transform: scale(1); }
  to   { box-shadow: 0 0 0 6px rgba(201,162,39,.0),  0 4px 12px rgba(0,0,0,.18); transform: scale(1.025); }
}
.intro-han{font-size:17px;color:var(--zhusha-d);line-height:1.45;font-weight:600;font-family:var(--font-han)}
.intro-ko{font-size:12px;color:var(--mo-l);margin-top:4px;line-height:1.4}
.intro-src{font-size:10px;color:var(--gutong);font-style:italic;margin-top:4px;letter-spacing:.04em}
.intro-name{font-family:var(--font-display);font-size:16px;font-weight:600;color:var(--mo);margin-top:4px}
.intro-charname{font-size:11px;color:var(--gutong);margin-top:2px}

/* 對決開始 — VS */
.intro-vs{position:relative;margin:14px auto;width:100%;text-align:center;
  animation:vsZoom .65s cubic-bezier(.34,1.6,.5,1);}
.intro-vs-text{
  display:inline-block;font-family:var(--font-display);font-size:32px;font-weight:700;
  color:var(--huang-l);letter-spacing:.16em;
  background:linear-gradient(180deg, var(--zhusha) 0%, var(--zhusha-d) 100%);
  border:2.5px solid var(--huang);
  padding:10px 22px;border-radius:14px;
  box-shadow:0 6px 18px rgba(110,24,24,.55), inset 0 0 0 1px rgba(255,224,138,.3);
}
.intro-vs-line{position:absolute;top:50%;left:0;right:0;height:2px;
  background:linear-gradient(90deg, transparent 0%, var(--huang) 30%, var(--huang) 70%, transparent 100%);
  z-index:-1}
@keyframes vsZoom{0%{opacity:0;transform:scale(.3) rotate(-20deg)}60%{transform:scale(1.12) rotate(3deg)}100%{opacity:1;transform:scale(1) rotate(0)}}

/* 배틀 중 펄스 (긴박감) */
@keyframes battlePulse{0%,100%{box-shadow:0 0 0 0 rgba(156,48,48,.55)}50%{box-shadow:0 0 0 10px rgba(156,48,48,0)}}
.battle-pulse{animation:battlePulse 1s ease-in-out infinite}
@keyframes battleShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
.battle-shake{animation:battleShake .4s ease-in-out infinite}

/* ─── 베팅 다이얼 ─────────────────────────────────────────────────── */
.bet-grid{display:grid;grid-template-columns:repeat(2, 1fr);gap:8px;margin-top:10px}
.bet-cell{
  border:1.5px solid var(--mi-d);background:var(--mi-w);
  border-radius:var(--r);padding:10px 8px 8px;cursor:pointer;text-align:center;
  font-family:var(--font-body);color:var(--mo);transition:all .12s;position:relative;
}
.bet-cell:not(.locked):hover{border-color:var(--zhusha);transform:translateY(-1px)}
.bet-cell.selected{border-color:var(--zhusha);background:#FFF8E8;box-shadow:0 0 0 2px var(--huang) inset}
.bet-cell.locked{opacity:.55;cursor:not-allowed}
.bet-cell .han{font-family:var(--font-display);font-size:18px;color:var(--zhusha-d);letter-spacing:.04em}
.bet-cell .pct{font-size:14px;font-weight:700;color:var(--huang-d);margin-top:2px;font-family:var(--font-display)}
.bet-cell .min{font-size:10.5px;color:var(--gutong);margin-top:1px}

/* v4: 베팅 단계별 출제 난이도 분포 strip (D1·D2·D3·D4 비율 시각화) */
.bet-cell .bet-diff-strip{
  display:flex;gap:1px;margin-top:6px;height:10px;border-radius:3px;overflow:hidden;
  border:1px solid rgba(0,0,0,.08);
}
.bet-cell .bet-diff-seg{
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-family:var(--font-display);font-weight:700;
  color:rgba(255,255,255,.92); text-shadow:0 1px 1px rgba(0,0,0,.4);
  min-width:0;letter-spacing:0;
}
.bet-cell .bet-diff-seg.d1{background:#5A8C4A}
.bet-cell .bet-diff-seg.d2{background:#C9A227}
.bet-cell .bet-diff-seg.d3{background:#C04030}
.bet-cell .bet-diff-seg.d4{background:#3C0C0C;color:var(--huang)}

.bet-cell .waiting-badge{
  position:absolute;top:4px;right:4px;
  background:var(--feicui);color:var(--mi-w);
  font-size:9.5px;padding:1px 6px;border-radius:8px;
  font-family:var(--font-display);font-weight:700;letter-spacing:.04em;
  box-shadow:0 1px 3px rgba(0,0,0,.2);
  min-width:26px;
}
.bet-cell .waiting-badge.zero{background:var(--mi-d);color:var(--gutong)}
.bet-cell .waiting-list{
  margin-top:8px;padding-top:6px;border-top:1px dashed var(--mi-d);
  display:flex;flex-wrap:wrap;gap:3px;justify-content:center;
  min-height:24px;
}
.bet-cell .waiting-list .w-chip{
  display:flex;align-items:center;gap:3px;
  font-size:10px;color:var(--mo-l);
  background:rgba(42,112,96,.1);border-radius:8px;padding:2px 6px 2px 3px;
  border:1px solid rgba(42,112,96,.25);
}
.bet-cell .waiting-list .w-chip .nm{font-weight:600;color:var(--mo);max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bet-cell .waiting-list .w-empty{
  font-size:10px;color:var(--gutong);font-style:italic;padding:2px 0;
}

/* ─── v2.2.2: 매칭 실시간 UI (둘러봄 + 큐 분리, idle 배너) ─────────────── */
.bet-cell .waiting-badges{
  position:absolute;top:4px;right:4px;display:flex;flex-direction:column;gap:3px;align-items:flex-end;
}
.bet-cell .waiting-badges .waiting-badge{
  position:static;top:auto;right:auto;
  font-size:9px;padding:1px 5px;border-radius:8px;
  font-family:var(--font-display);font-weight:700;letter-spacing:.04em;
  min-width:36px;text-align:center;
  box-shadow:0 1px 2px rgba(0,0,0,.15);
}
.bet-cell .waiting-badge.queue{ background:var(--feicui); color:var(--mi-w); }
.bet-cell .waiting-badge.queue.zero{ background:var(--mi-d); color:var(--gutong); box-shadow:none; }
.bet-cell .waiting-badge.idle{ background:var(--gutong); color:var(--mi-w); opacity:.85; }
.bet-cell .waiting-badge.idle.zero{ background:transparent; color:var(--gutong); box-shadow:none; border:1px dashed var(--mi-d); opacity:.6; }
.bet-cell .waiting-list .w-chip.q{ background:rgba(42,112,96,.14);border-color:rgba(42,112,96,.32); }
.bet-cell .waiting-list .w-chip.i{ background:rgba(135,106,54,.10);border-color:rgba(135,106,54,.28);opacity:.85; }
.idle-banner{
  background:linear-gradient(90deg, rgba(135,106,54,.08), rgba(201,162,39,.10));
  border:1px solid rgba(135,106,54,.25);padding:10px 12px;
}
.idle-banner .idle-banner-title{
  font-family:var(--font-display);font-size:13px;color:var(--zhusha-d);
  margin-bottom:6px;letter-spacing:.04em;
}
.idle-banner .idle-banner-title .han{
  background:var(--gutong);color:var(--mi-w);padding:1px 5px;border-radius:3px;
  font-size:11px;margin-right:4px;
}
.idle-banner .idle-banner-hint{
  font-family:var(--font-body);font-size:11px;color:var(--mo-l);font-weight:400;letter-spacing:0;
}
.idle-banner-list{display:flex;flex-wrap:wrap;gap:4px}
.idle-banner-list .idle-chip{
  display:inline-flex;align-items:center;gap:3px;
  background:rgba(201,162,39,.12);border:1px solid rgba(201,162,39,.32);
  border-radius:10px;padding:2px 6px 2px 3px;font-size:10.5px;
}
.idle-banner-list .idle-chip .nm{font-weight:600;color:var(--mo);max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.idle-banner-list .idle-chip .lv{
  font-family:var(--font-display);font-size:9.5px;color:var(--zhusha-d);
  background:var(--mi-w);padding:1px 4px;border-radius:5px;margin-left:2px;
}
.idle-banner-list .idle-more{font-size:10.5px;color:var(--gutong);font-style:italic;align-self:center;padding-left:4px}

/* ─── v2.2.2: 오답 빈도 분석 (clickable rows) ──────────────────────────── */
.wrong-list{display:flex;flex-direction:column;gap:6px;margin-top:6px}
.wrong-row{
  display:flex;align-items:stretch;gap:10px;padding:8px 10px;border-radius:var(--r);
  background:var(--mi-w);border:1px solid var(--mi-d);
  transition:transform .12s, box-shadow .12s, border-color .12s;
}
.wrong-row.clickable{cursor:pointer}
.wrong-row.clickable:hover{transform:translateX(2px);border-color:var(--zhusha);box-shadow:0 2px 6px rgba(156,48,48,.15)}
.wrong-row.dim{opacity:.65}
.wrong-row .rank{
  font-family:var(--font-display);font-size:18px;color:var(--huang-d);
  width:28px;flex-shrink:0;text-align:center;align-self:center;letter-spacing:.04em;
}
.wrong-row .meta{flex:1;min-width:0}
.wrong-row .meta .lbl{font-size:13px;color:var(--mo);font-weight:600;font-family:var(--font-display);letter-spacing:.02em}
.wrong-row .meta .lbl .chev{color:var(--zhusha);font-weight:400;margin-left:2px}
.wrong-row .meta .sub{font-size:10.5px;color:var(--mo-l);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wrong-row .meta .bar-track{margin-top:4px;height:6px;background:var(--mi-d);border-radius:3px;overflow:hidden}
.wrong-row .meta .bar-fill{height:100%;background:linear-gradient(90deg, var(--huang), var(--zhusha));border-radius:3px;transition:width .4s}
.wrong-row .cnt{
  font-family:var(--font-display);font-size:18px;color:var(--zhusha-d);
  align-self:center;text-align:right;flex-shrink:0;letter-spacing:.02em;
}
.wrong-row .cnt span{font-size:10.5px;color:var(--gutong);margin-left:2px;font-weight:400}

/* ─── v2.2.2: 모달 (오답 상세·처방 심층) ───────────────────────────────── */
.modal-head{padding:14px 16px 8px;border-bottom:1px solid var(--mi-d)}
.modal-tag{font-size:10px;color:var(--gutong);font-family:var(--font-display);letter-spacing:.08em;text-transform:uppercase}
.modal-title{font-family:var(--font-display);font-size:20px;color:var(--zhusha-d);margin:4px 0 2px;letter-spacing:.02em}
.modal-sub{font-size:11.5px;color:var(--mo-l)}
.modal-body{padding:12px 16px 16px;max-height:65vh;overflow-y:auto}
.modal-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:12px;flex-wrap:wrap}
.wrong-q{font-size:14px;color:var(--mo);line-height:1.6;margin-bottom:8px;font-weight:500}
.wrong-opts{display:flex;flex-direction:column;gap:4px}
.wrong-opt{
  display:flex;align-items:flex-start;gap:6px;padding:6px 8px;
  border:1px solid var(--mi-d);border-radius:5px;background:var(--mi-w);font-size:12.5px;
}
.wrong-opt.ok{background:rgba(42,112,96,.10);border-color:var(--feicui)}
.wrong-opt .oi{font-family:var(--font-display);color:var(--gutong);min-width:18px}
.wrong-opt .ot{flex:1;color:var(--mo)}
.wrong-opt .ob{
  background:var(--feicui);color:var(--mi-w);font-size:10px;padding:1px 6px;
  border-radius:3px;font-family:var(--font-display);font-weight:700;letter-spacing:.04em;align-self:center;
}
.wrong-expl{margin-top:10px;background:var(--mi);padding:8px 10px;border-radius:5px;border-left:3px solid var(--huang)}
.wrong-expl .lbl{font-family:var(--font-display);font-size:12px;color:var(--zhusha-d);margin-bottom:3px}
.wrong-expl .lbl .han{background:var(--zhusha-d);color:var(--mi-w);padding:1px 5px;border-radius:3px;margin-right:4px}
.wrong-expl .txt{font-size:12px;color:var(--mo-l);white-space:pre-wrap;line-height:1.5}

/* clickable bar in exam analysis (byFormula) */
.bar-chart.formula-bars .bar-row.clickable{cursor:pointer;border-radius:5px;padding:2px 4px;margin:-2px -4px;transition:background .12s}
.bar-chart.formula-bars .bar-row.clickable:hover{background:rgba(156,48,48,.06)}
.bar-chart.formula-bars .bar-label .chev{color:var(--zhusha);margin-left:2px}

/* ─── v2.2.2: 처방 심층 분석 (modal & detail card) ───────────────────── */
.fdeep-body{display:flex;flex-direction:column;gap:10px}
.fdeep-card{
  background:var(--mi-w);border:1px solid var(--mi-d);border-radius:6px;padding:10px 12px;
}
.fdeep-han{font-family:var(--font-display);font-size:18px;color:var(--zhusha-d);letter-spacing:.04em}
.fdeep-han .fdeep-ko{font-size:13px;color:var(--mo-l);font-weight:400;margin-left:6px}
.fdeep-meta{font-size:10.5px;color:var(--gutong);margin:2px 0 6px;font-family:var(--font-display);letter-spacing:.04em}
.fdeep-row{display:flex;gap:8px;font-size:12px;padding:2px 0;align-items:flex-start}
.fdeep-row .lbl{
  font-family:var(--font-display);color:var(--zhusha-d);font-size:11.5px;min-width:62px;flex-shrink:0;
  background:var(--mi);padding:1px 5px;border-radius:3px;text-align:center;align-self:flex-start;
}
.fdeep-row .val{color:var(--mo);line-height:1.5;flex:1}
.fdeep-key{margin-top:6px;padding-top:6px;border-top:1px dashed var(--mi-d)}
.fdeep-key .lbl{font-family:var(--font-display);font-size:11.5px;color:var(--zhusha-d);margin-bottom:4px}
.fdeep-key ul{margin:0;padding-left:16px;font-size:11.5px;color:var(--mo);line-height:1.55}
.fdeep-key li{margin-bottom:2px}
.ms-pill{display:inline-block;padding:1px 6px;border-radius:9px;font-size:11px;font-family:var(--font-display);margin-right:3px}
.ms-j{background:rgba(156,48,48,.15);color:var(--zhusha-d);border:1px solid rgba(156,48,48,.4)}
.ms-s{background:rgba(201,162,39,.20);color:var(--huang-d);border:1px solid rgba(201,162,39,.5)}
.ms-z{background:rgba(48,104,160,.15);color:#3068A0;border:1px solid rgba(48,104,160,.4)}
.ms-sh{background:rgba(42,112,96,.15);color:var(--feicui);border:1px solid rgba(42,112,96,.4)}
.fdeep-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:560px){ .fdeep-grid{grid-template-columns:1fr} }
.fdeep-block{background:var(--mi-w);border:1px solid var(--mi-d);border-radius:6px;padding:8px 10px}
.fdeep-blk-title{font-family:var(--font-display);font-size:12.5px;color:var(--zhusha-d);margin-bottom:4px;letter-spacing:.04em}
.fdeep-blk-title .han{background:var(--zhusha-d);color:var(--mi-w);padding:1px 5px;border-radius:3px;margin-right:4px;font-size:11px}
.fdeep-exams{display:flex;flex-direction:column;gap:4px;margin-top:4px}
.fdeep-exam-row{
  padding:6px 8px;border:1px solid var(--mi-d);border-radius:4px;background:var(--mi);
  cursor:pointer;transition:transform .1s, border-color .1s;
}
.fdeep-exam-row:hover{transform:translateX(2px);border-color:var(--zhusha)}
.fdeep-exam-row .ex-meta{display:flex;gap:5px;flex-wrap:wrap;font-size:10.5px;margin-bottom:3px;font-family:var(--font-display);letter-spacing:.02em}
.fdeep-exam-row .ex-meta span{padding:1px 5px;border-radius:3px;background:var(--mi-w);color:var(--mo-l);border:1px solid var(--mi-d)}
.fdeep-exam-row .ex-meta .ex-w{background:rgba(156,48,48,.12);color:var(--zhusha-d);border-color:rgba(156,48,48,.3)}
.fdeep-exam-row .ex-meta .ex-diff{font-weight:700}
.fdeep-exam-row .ex-meta .diff-1{color:var(--feicui)}
.fdeep-exam-row .ex-meta .diff-2{color:var(--huang-d)}
.fdeep-exam-row .ex-meta .diff-3{color:var(--zhusha-d)}
.fdeep-exam-row .ex-meta .diff-4{background:var(--zhusha-d);color:var(--mi-w);border-color:var(--zhusha-d)}
.fdeep-exam-row .ex-q{font-size:12px;color:var(--mo);line-height:1.4}
.bar-chart.mini{margin-top:4px}
.bar-chart.mini .bar-row{font-size:11.5px}
.bar-chart.mini .bar-label{width:64px;font-size:11px}
.bar-chart.mini .bar-track{height:10px}

/* ─── v2.2.2: 처방별 분석 인덱스 — 5종 시각화 ─────────────────────────── */
/* 공통 처방 칩 */
.fchip-grid{display:flex;flex-wrap:wrap;gap:5px}
.fchip{
  display:inline-flex;flex-direction:column;align-items:center;gap:1px;
  padding:6px 8px 5px;min-width:78px;
  background:linear-gradient(180deg, var(--mi-w) 0%,
    rgba(156,48,48, calc(var(--heat, 0) * 0.18)) 100%);
  border:1px solid var(--mi-d);border-radius:6px;cursor:pointer;
  font-family:var(--font-body);transition:transform .12s, box-shadow .12s, border-color .12s;
  position:relative;
}
.fchip:hover{transform:translateY(-1px);border-color:var(--zhusha);box-shadow:0 2px 6px rgba(156,48,48,.18)}
.fchip .han{font-family:var(--font-display);font-size:14px;color:var(--zhusha-d);letter-spacing:.02em}
.fchip .ko{font-size:10.5px;color:var(--mo-l);margin-top:1px}
.fchip.small{min-width:64px;padding:4px 6px 3px}
.fchip.small .han{font-size:12.5px}
.fchip.small .ko{font-size:9.5px}
.fchip .badge{
  position:absolute;top:-5px;font-size:9px;padding:1px 4px;border-radius:8px;
  font-family:var(--font-display);font-weight:700;line-height:1.2;
}
.fchip .badge.q{right:-5px;background:var(--gutong);color:var(--mi-w)}
.fchip .badge.w{left:-5px;background:var(--zhusha-d);color:var(--mi-w)}

/* ① 効能 클러스터 그리드 */
.fidx-eff-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));gap:8px;margin-top:8px}
.fidx-eff-cell{
  border:1px solid var(--mi-d);border-top:3px solid var(--cat-color, var(--zhusha));
  border-radius:6px;padding:8px 10px;background:var(--mi-w);
}
.fidx-eff-head{
  display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px;
  font-family:var(--font-display);
}
.fidx-eff-head .han{font-size:15px;color:var(--cat-color, var(--zhusha-d));letter-spacing:.04em}
.fidx-eff-head .cnt{font-size:10.5px;color:var(--gutong)}

/* ② 章·分類 */
.fidx-ch-list{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.fidx-ch-cell{border:1px solid var(--mi-d);border-radius:6px;padding:8px 10px;background:var(--mi-w)}
.fidx-ch-head{
  font-family:var(--font-display);font-size:13px;color:var(--zhusha-d);
  margin-bottom:6px;letter-spacing:.04em;display:flex;justify-content:space-between;
}
.fidx-ch-head .cnt{font-size:10.5px;color:var(--gutong);font-weight:400}

/* ③ 補瀉×寒熱 scatter */
.fidx-scatter{
  position:relative;width:100%;max-width:600px;aspect-ratio:5/4;margin:8px auto 0;
  background:linear-gradient(135deg, #F0E8DC 0%, #FFF5DC 50%, #FFE8E0 100%);
  border:1.5px solid var(--mi-d);border-radius:var(--r);overflow:visible;
}
.fidx-scatter .axis{position:absolute;background:var(--gutong);opacity:.30}
.fidx-scatter .axis-x{left:6%;right:6%;height:1px;top:50%}
.fidx-scatter .axis-y{top:8%;bottom:8%;width:1px;left:50%}
.fidx-scatter .axis-tick{
  position:absolute;font-size:10.5px;color:var(--mo-l);
  font-family:var(--font-display);text-align:center;letter-spacing:.04em;
}
.fidx-scatter .t-left{left:2%;top:48%}
.fidx-scatter .t-right{right:2%;top:48%}
.fidx-scatter .t-top{left:50%;top:2%;transform:translateX(-50%)}
.fidx-scatter .t-bot{left:50%;bottom:2%;transform:translateX(-50%)}
.fidx-scatter .t-center{left:50%;top:50%;transform:translate(-50%, -50%);font-size:9.5px;color:var(--gutong);opacity:.6;background:rgba(255,255,255,.4);padding:1px 4px;border-radius:3px}
.fidx-dot{
  position:absolute;transform:translate(-50%, -50%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:38px;height:38px;border-radius:50%;
  border:2px solid var(--mi-w);box-shadow:0 2px 6px rgba(0,0,0,.18);
  cursor:pointer;transition:transform .12s, box-shadow .12s;
  font-family:var(--font-display);color:var(--mi-w);font-size:11px;
  padding:0;line-height:1.0;
}
.fidx-dot:hover{transform:translate(-50%, -50%) scale(1.18);box-shadow:0 3px 10px rgba(0,0,0,.28);z-index:5}
.fidx-dot .han{font-size:13px;letter-spacing:0}
.fidx-dot .lbl{
  position:absolute;top:calc(100% + 2px);left:50%;transform:translateX(-50%);
  font-size:9.5px;color:var(--mo);background:rgba(255,255,255,.85);
  padding:1px 4px;border-radius:3px;white-space:nowrap;font-family:var(--font-body);
  pointer-events:none;
}
.fidx-dot.grp-bu{background:linear-gradient(135deg, #C9A227, #A07A20)}
.fidx-dot.grp-wen{background:linear-gradient(135deg, #B25040, #882C2C)}
.fidx-dot.grp-biao{background:linear-gradient(135deg, #2A7060, #1C5040)}
.fidx-dot.grp-other{background:linear-gradient(135deg, #5B4080, #3A2860)}
.fidx-scatter-legend{display:flex;justify-content:center;gap:14px;margin-top:6px;font-size:11px;color:var(--mo-l);font-family:var(--font-display);letter-spacing:.04em}
.fidx-scatter-legend .lg-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px;vertical-align:middle;border:1px solid var(--mi-w);box-shadow:0 1px 2px rgba(0,0,0,.2)}
.fidx-scatter-legend .lg-dot.bu{background:linear-gradient(135deg, #C9A227, #A07A20)}
.fidx-scatter-legend .lg-dot.wen{background:linear-gradient(135deg, #B25040, #882C2C)}
.fidx-scatter-legend .lg-dot.biao{background:linear-gradient(135deg, #2A7060, #1C5040)}

/* ─── 통계 차트 ─────────────────────────────── */
.bar-chart{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.bar-row{display:flex;align-items:center;gap:8px;font-size:12.5px}
.bar-row .bar-label{width:90px;color:var(--mo);font-weight:600;text-align:right;font-size:12px;flex-shrink:0}
.bar-row .bar-track{flex:1;height:14px;background:var(--mi-d);border-radius:7px;overflow:hidden;position:relative;min-width:0}
.bar-row .bar-fill{height:100%;background:linear-gradient(90deg, var(--huang) 0%, var(--zhusha) 100%);
  border-radius:7px;display:flex;align-items:center;justify-content:flex-end;
  padding-right:6px;color:var(--huang-l);font-size:10.5px;font-weight:700;font-family:var(--font-display);
  transition:width .4s ease;min-width:fit-content}
.bar-row .bar-val{width:48px;text-align:left;color:var(--mo-l);font-size:11.5px;font-family:var(--font-display);flex-shrink:0}

/* ─── 약재 성미 scatter ──────────────── */
.herb-scatter{
  position:relative;width:100%;max-width:600px;aspect-ratio:5/4;margin:0 auto;
  background:linear-gradient(180deg, #FFF5DC 0%, #F5E6D3 100%);
  border:1.5px solid var(--mi-d);border-radius:var(--r);overflow:hidden;
}
.herb-scatter .axis{position:absolute;background:var(--gutong);opacity:.35}
.herb-scatter .axis-x{left:6%;right:6%;height:1px;top:88%}
.herb-scatter .axis-y{top:8%;bottom:14%;width:1px;left:50%}
.herb-scatter .axis-tick{
  position:absolute;font-size:10.5px;color:var(--mo-l);
  font-family:var(--font-display);text-align:center;letter-spacing:.04em;
}
.herb-scatter .axis-tick.tk-x{top:90%;transform:translateX(-50%);padding-top:2px}
.herb-scatter .axis-tick.tk-y{left:51%;transform:translateY(-50%);padding-left:4px;font-size:9.5px;color:var(--gutong)}
.herb-scatter .ax-title{
  position:absolute;font-size:10px;color:var(--gutong);font-family:var(--font-display);letter-spacing:.06em;
}
.herb-scatter .ax-title.tt-x{bottom:1px;left:50%;transform:translateX(-50%)}
.herb-scatter .ax-title.tt-y{top:2px;left:51%;transform:translateX(-50%)}
.herb-scatter .herb-bubble{
  position:absolute;border-radius:50%;
  color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-han);font-size:9.5px;font-weight:700;
  cursor:pointer;transform:translate(-50%,-50%);
  box-shadow:0 1px 4px rgba(0,0,0,.30);
  border:1.5px solid rgba(255,255,255,.65);
  transition:transform .12s, box-shadow .12s, z-index 0s;
  z-index:1;
}
.herb-scatter .herb-bubble:hover{transform:translate(-50%,-50%) scale(1.18);box-shadow:0 3px 10px rgba(0,0,0,.45);z-index:5}
/* 性 (찬↔뜨거움) 색상 */
.herb-scatter .b-cold{background:radial-gradient(circle at 30% 30%, #5DA8C8, #08405C)}
.herb-scatter .b-cool{background:radial-gradient(circle at 30% 30%, #6FB0D8, #2A6080)}
.herb-scatter .b-neut{background:radial-gradient(circle at 30% 30%, #B5946A, #6E5028)}
.herb-scatter .b-warm{background:radial-gradient(circle at 30% 30%, #E08858, #A02818)}
.herb-scatter .b-hot {background:radial-gradient(circle at 30% 30%, #FF8030, #6E0E0E)}

.legend-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px;font-size:11px;color:var(--mo-l)}
.legend-row .lg-sw{display:inline-block;width:12px;height:12px;border-radius:50%;margin-right:4px;vertical-align:middle;border:1px solid rgba(255,255,255,.6);box-shadow:0 1px 2px rgba(0,0,0,.2)}

/* 효능 grid */
.efn-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(140px,1fr));gap:8px;margin-top:10px}
.efn-cell{
  background:var(--mi-w);border:1.5px solid var(--mi-d);border-radius:var(--r-sm);
  padding:8px 10px;font-size:12px;color:var(--mo);
}
.efn-cell .ef-title{font-family:var(--font-display);font-size:13px;color:var(--zhusha-d);font-weight:700;margin-bottom:3px;display:flex;align-items:center;justify-content:space-between}
.efn-cell .ef-count{font-family:var(--font-display);color:var(--gutong);font-size:11px}
.efn-cell .ef-herbs{font-size:11px;color:var(--mo-l);line-height:1.5;margin-top:2px}

/* role pie — CSS conic */
.role-pie-wrap{display:flex;flex-direction:column;align-items:center;margin-top:8px}
.role-pie{
  width:170px;height:170px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(28,20,10,.25), inset 0 0 0 2px var(--mi-w);
  position:relative;
}
.role-pie .core{
  width:78px;height:78px;background:var(--mi-w);border-radius:50%;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  font-family:var(--font-display);font-size:12px;color:var(--mo);text-align:center;line-height:1.2;
  box-shadow:inset 0 0 0 1px var(--mi-d);
}
.role-pie .core .big{font-size:22px;color:var(--zhusha-d);font-weight:700}
.role-pie .core .lb{font-size:10.5px;color:var(--gutong)}
.role-legend{display:grid;grid-template-columns:repeat(2,1fr);gap:5px 10px;margin-top:10px;font-size:11.5px;max-width:240px}
.role-legend .lg{display:flex;align-items:center;gap:5px;font-family:var(--font-display)}
.role-legend .sw{width:13px;height:13px;border-radius:3px;flex-shrink:0;border:1px solid rgba(0,0,0,.1)}
.role-legend .v{margin-left:auto;color:var(--gutong);font-family:var(--font-body);font-weight:600}

/* ─── 등급 사다리 ─────────────────────────────────── */
.ladder-row{
  display:flex;align-items:flex-start;gap:10px;padding:8px 6px;border-radius:6px;
  margin-bottom:4px;
}
.ladder-row.is-current{background:#FFF8E0;outline:1.5px solid var(--huang)}
.ladder-row .ladder-mid{flex:1;min-width:0}
.ladder-row .ladder-title{font-family:var(--font-display);font-size:14px}
.ladder-row .ladder-desc{font-size:10.5px;color:var(--gutong);margin-top:1px;line-height:1.4}
.ladder-row .ladder-cost{font-size:11.5px;font-family:var(--font-display);white-space:nowrap;flex-shrink:0}
.ladder-users{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.ladder-user-chip{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10.5px;color:var(--mo-l);
  background:var(--mi-w);border:1px solid var(--mi-d);
  border-radius:10px;padding:2px 7px 2px 3px;
}
.ladder-user-chip.is-me{background:#FFF8E0;border-color:var(--huang)}
.ladder-user-chip .nm{font-weight:600;color:var(--mo);max-width:78px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ladder-user-empty{font-size:10.5px;color:var(--gutong);font-style:italic;margin-top:4px}

/* ─── 분석 sub-tabs ──────────────── */
.subtab-row{display:flex;flex-wrap:wrap;gap:5px;margin:6px 0 10px}
.subtab-btn{
  font-family:var(--font-body);font-size:11.5px;
  padding:5px 11px;border-radius:14px;cursor:pointer;
  background:var(--mi-w);border:1.5px solid var(--mi-d);color:var(--mo-l);
}
.subtab-btn.on{background:var(--zhusha);color:var(--mi-w);border-color:var(--zhusha)}
.subtab-btn:hover:not(.on){border-color:var(--zhusha)}

/* ─── 太極 SVG 회전 (장식용 — 인물 외 사용 OK) ─────────────────── */
.taiji{display:inline-block;vertical-align:middle;filter:drop-shadow(0 2px 6px rgba(28,20,10,.25))}
.taiji.spin{animation:rotate360 4.5s linear infinite}
.taiji.spin.fast{animation-duration:1s}

/* ─── CSS 로더 (太極 SVG 대체) ──────────────────────────────────── */
@keyframes rotate360 {to{transform:rotate(360deg)}}
.cloader{
  display:inline-block;border-radius:50%;position:relative;
  background:conic-gradient(from 0deg, var(--zhusha) 0deg, var(--huang) 90deg, var(--mi-w) 180deg, var(--xuan) 270deg, var(--zhusha) 360deg);
  animation:rotate360 1.8s linear infinite;
  box-shadow:0 2px 8px rgba(28,20,10,.25), inset 0 0 0 2px var(--mi-w);
  vertical-align:middle;
}
.cloader::after{
  content:'';position:absolute;inset:18%;border-radius:50%;
  background:radial-gradient(circle at 50% 38%, var(--mi-w), var(--mi));
}
.cloader.fast{animation-duration:.55s}
.cloader.battle{

/* ─── v8.7 F2: 神급 스킬 시각 효과 ───────────────────────────────────── */
/* 화면 전체에 1.5초 풀스크린 오버레이 → 스킬마다 다른 색·문자·애니메이션 */
.skill-fx{
  position:fixed; inset:0; z-index:9999; pointer-events:none;
  display:flex; align-items:center; justify-content:center;
  background:radial-gradient(circle, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0) 70%);
  animation: skill-fx-fade 1.5s ease-out forwards;
}
.skill-fx-han{
  font-family:var(--font-display); font-size:140px; font-weight:700;
  text-shadow:0 0 30px currentColor, 0 0 60px currentColor;
  animation: skill-fx-han 1.5s cubic-bezier(.2,1.4,.4,1) forwards;
}
.skill-fx-particles{
  position:absolute; inset:0; pointer-events:none; overflow:hidden;
}
.skill-fx-particles span{
  position:absolute; width:6px; height:6px; border-radius:50%;
  background:currentColor; box-shadow:0 0 8px currentColor;
  animation: skill-fx-particle 1.4s ease-out forwards;
}
@keyframes skill-fx-fade{
  0%{opacity:0} 12%{opacity:1} 70%{opacity:1} 100%{opacity:0}
}
@keyframes skill-fx-han{
  0%{opacity:0; transform:scale(.3) rotate(-15deg)}
  35%{opacity:1; transform:scale(1.15) rotate(2deg)}
  55%{transform:scale(1) rotate(0)}
  100%{opacity:0; transform:scale(1.05) translateY(-8px)}
}
@keyframes skill-fx-particle{
  0%{opacity:0; transform:translate(0,0) scale(0)}
  20%{opacity:1; transform:translate(var(--dx,30px), var(--dy,-30px)) scale(1)}
  100%{opacity:0; transform:translate(calc(var(--dx,30px)*4), calc(var(--dy,-30px)*4)) scale(.2)}
}
/* 스킬별 색 */
.skill-fx.fx-huangdi  { color:#F8C547 }   /* 黃帝 — 황금 */
.skill-fx.fx-shennong { color:#7CA85F }   /* 神農 — 청록 (본초) */
.skill-fx.fx-fuxi     { color:#6B7FB8 }   /* 伏羲 — 청남 (卦象) */
.skill-fx.fx-nvwa     { color:#D88BB0 }   /* 女媧 — 연홍 (補天) */
.skill-fx.fx-qibo     { color:#9C3030 }   /* 岐伯 — 朱砂 (雷公問難) */

<!-- 서비스 워커 v11.6: 자동 업데이트 감지 + skipWaiting -->
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(reg => {
      // 매 페이지 로드 시 SW update 체크 (캐시 우회)
      try{ reg.update(); }catch(_){}
      // 새 SW 발견 시 자동 skipWaiting → 즉시 activate
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing;
        if(!nw) return;
        nw.addEventListener('statechange', () => {
          if(nw.state === 'installed' && navigator.serviceWorker.controller){
            // 이전 SW 가 컨트롤 중인데 새 SW 가 installed → waiting 상태.
            //   강제로 활성화 시도 (sw.js 의 message 리스너가 skipWaiting 호출)
            try{ nw.postMessage('SKIP_WAITING'); }catch(_){}
            try{ if(window.toast) window.toast('업데이트 적용됨 · 새로고침합니다','gold'); }catch(_){}
          }
        });
      });
      // controller 변경 (새 SW activate) → 1회 자동 reload
      let _reloaded = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if(_reloaded) return;
        _reloaded = true;
        setTimeout(() => location.reload(), 250);
      });
    }).catch(()=>{});
  });
}
</script>
