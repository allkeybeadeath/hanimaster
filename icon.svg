<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="黃帝 — 황제내경의 시조">
  <!-- 배경: 朱砂紅 + 帝王黃 동심원 + 八卦 모서리 장식 -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#FFE08A"/>
      <stop offset="55%" stop-color="#E0A030"/>
      <stop offset="100%" stop-color="#9C3030"/>
    </radialGradient>
    <linearGradient id="robe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD86E"/>
      <stop offset="100%" stop-color="#C9A227"/>
    </linearGradient>
    <linearGradient id="crown" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2C2010"/>
      <stop offset="100%" stop-color="#5C3818"/>
    </linearGradient>
    <radialGradient id="face" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F8E0B8"/>
      <stop offset="100%" stop-color="#D8A878"/>
    </radialGradient>
  </defs>

  <!-- 외곽 圓: 朱砂 테두리 -->
  <circle cx="256" cy="256" r="252" fill="#9C3030"/>
  <circle cx="256" cy="256" r="244" fill="url(#bg)"/>

  <!-- 八卦 외곽 장식 (8 방위 점) -->
  <g fill="#5C2C0C" opacity="0.55">
    <circle cx="256" cy="20" r="6"/>
    <circle cx="256" cy="492" r="6"/>
    <circle cx="20" cy="256" r="6"/>
    <circle cx="492" cy="256" r="6"/>
    <circle cx="89" cy="89" r="5"/>
    <circle cx="423" cy="89" r="5"/>
    <circle cx="89" cy="423" r="5"/>
    <circle cx="423" cy="423" r="5"/>
  </g>

  <!-- 곤룡포 (어깨~몸통) -->
  <path d="M 100,430 Q 120,360 180,330 L 332,330 Q 392,360 412,430 L 412,512 L 100,512 Z" fill="url(#robe)" stroke="#5C2C0C" stroke-width="3"/>
  <!-- 곤룡포 中央 蛟龍 패턴 (간략화 — 원 안에 龍자) -->
  <circle cx="256" cy="420" r="38" fill="#9C3030" stroke="#5C2C0C" stroke-width="2"/>
  <text x="256" y="440" text-anchor="middle" font-family="serif" font-size="46" font-weight="700" fill="#FFE08A">龍</text>

  <!-- 목 -->
  <rect x="232" y="300" width="48" height="40" fill="url(#face)" stroke="#8C5028" stroke-width="2"/>

  <!-- 얼굴: 둥근 형태 -->
  <ellipse cx="256" cy="240" rx="80" ry="92" fill="url(#face)" stroke="#8C5028" stroke-width="3"/>

  <!-- 눈썹 -->
  <path d="M 200,215 Q 215,205 232,212" stroke="#2C2010" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 280,212 Q 297,205 312,215" stroke="#2C2010" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- 눈 (실눈 — 인자한 표정) -->
  <path d="M 200,232 Q 215,238 232,232" stroke="#2C2010" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M 280,232 Q 297,238 312,232" stroke="#2C2010" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- 코 -->
  <path d="M 256,250 L 250,280 Q 256,286 262,280 Z" fill="#A87454" stroke="#8C5028" stroke-width="1.5"/>

  <!-- 입 -->
  <path d="M 240,300 Q 256,305 272,300" stroke="#5C2C0C" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- 긴 수염 (양옆에서 늘어진) -->
  <path d="M 220,295 Q 200,340 200,380" stroke="#F0E0C0" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.92"/>
  <path d="M 230,308 Q 220,355 222,395" stroke="#F0E0C0" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.92"/>
  <path d="M 292,295 Q 312,340 312,380" stroke="#F0E0C0" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.92"/>
  <path d="M 282,308 Q 292,355 290,395" stroke="#F0E0C0" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.92"/>
  <!-- 가운데 턱수염 -->
  <path d="M 256,308 Q 250,360 256,400 Q 262,360 256,308" fill="#F0E0C0" stroke="#C8B080" stroke-width="1.5" opacity="0.92"/>

  <!-- 면류관 (冕旒) -->
  <!-- 모자 본체 -->
  <rect x="172" y="135" width="168" height="38" fill="url(#crown)" stroke="#2C2010" stroke-width="2"/>
  <!-- 면판 (위의 평평한 판) -->
  <path d="M 150,128 L 362,128 L 350,148 L 162,148 Z" fill="#1C140A" stroke="#000" stroke-width="2"/>
  <!-- 면류 — 앞에 늘어진 12 玉 -->
  <g fill="#FFE08A" stroke="#5C2C0C" stroke-width="1">
    <circle cx="170" cy="156" r="4"/>
    <circle cx="170" cy="172" r="4"/>
    <circle cx="170" cy="188" r="4"/>
    <circle cx="194" cy="156" r="4"/>
    <circle cx="194" cy="172" r="4"/>
    <circle cx="194" cy="188" r="4"/>
    <circle cx="318" cy="156" r="4"/>
    <circle cx="318" cy="172" r="4"/>
    <circle cx="318" cy="188" r="4"/>
    <circle cx="342" cy="156" r="4"/>
    <circle cx="342" cy="172" r="4"/>
    <circle cx="342" cy="188" r="4"/>
  </g>
  <!-- 면류 연결선 -->
  <g stroke="#5C2C0C" stroke-width="1">
    <line x1="170" y1="148" x2="170" y2="155"/>
    <line x1="194" y1="148" x2="194" y2="155"/>
    <line x1="318" y1="148" x2="318" y2="155"/>
    <line x1="342" y1="148" x2="342" y2="155"/>
  </g>
  <!-- 모자 상단 장식 -->
  <circle cx="256" cy="120" r="10" fill="#FFE08A" stroke="#5C2C0C" stroke-width="2"/>
  <circle cx="256" cy="120" r="4" fill="#9C3030"/>

  <!-- 하단 篆書 "黃帝" 인장 -->
  <g transform="translate(196,470)">
    <rect x="0" y="0" width="120" height="34" fill="#9C3030" stroke="#FFE08A" stroke-width="2" rx="3"/>
    <text x="60" y="26" text-anchor="middle" font-family="serif" font-size="22" font-weight="700" fill="#FFE08A" letter-spacing="6">黃帝</text>
  </g>
</svg>
